<div class="form-row">
    {% if field.field.widget.input_type == "checkbox" %}
        <label class="inline-check">{{ field }} {{ field.label }}{% if field.field.required %}<span class="required-mark" aria-hidden="true">*</span>{% endif %}</label>
    {% else %}
        <label for="{{ field.id_for_label }}">{{ field.label }}{% if field.field.required %}<span class="required-mark" aria-hidden="true">*</span>{% endif %}</label>
        {{ field }}
    {% endif %}
    {% if field.help_text %}<small class="help-text">{{ field.help_text }}</small>{% endif %}
    {% for error in field.errors %}<p class="field-error">{{ error }}</p>{% endfor %}
</div>
